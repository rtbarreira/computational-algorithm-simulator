version: "3.9"

services:
  api:
    build: .
    container_name: clojure-test-api
    ports:
      - "5000:5000"
    working_dir: /app
    volumes:
      - .:/app
    command: python3 api.py
    environment:
      - PYTHONUNBUFFERED=1

  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - ~/.n8n:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
    depends_on:
      - api